<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>stlite app</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.60.2/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.60.2/build/stlite.js"></script>
    <script>
      stlite.mount(
   {
    requirements: ["json", "random"],
    entrypoint: "quiz.py", // The target file of the `streamlit run` command
    files: {
        "quiz.py": {
        url: "quiz.py",
        },
        "content/sat.json":{
        url: "./content/sat.json"
        }
    },
    },
    document.getElementById("root")
);
    </script>
  </body>
</html>
